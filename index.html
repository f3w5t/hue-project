<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Simulator - Probability Project</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="Picture2-1.jpg" alt="Faculty Logo" class="logo left-logo">
            <div class="header-text">
                <h1>Dice Simulator 🎲</h1>
                <p class="subtitle">A visual demonstration of probability and the Law of Large Numbers</p>
            </div>
            <img src="cropped-Logo-blue.png" alt="University Logo" class="logo right-logo">
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="numDice">Number of Dice (1-5):</label>
                <input type="number" id="numDice" min="1" max="5" value="1">
            </div>

            <div class="input-group">
                <label for="numRolls">Number of Rolls:</label>
                <input type="number" id="numRolls" min="1" max="100000" value="1000">
            </div>

            <button id="rollBtn">Roll Dice Simulation</button>
        </div>

        <div class="results">
            <h2>Simulation Results</h2>
            <!-- Visualization Requirement -->
            <div class="chart-container">
                <canvas id="resultChart"></canvas>
            </div>
            
            <!-- Output clearly displayed Requirement -->
            <div id="stats">
                <p class="empty-state">Enter configurations and click the button to see simulation results here!</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
